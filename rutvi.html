<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECHMONEY - Rút ví trả sau</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0f172a;color:#fff;min-height:100vh;padding:24px}
.wrap{max-width:900px;margin:auto}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.logo{font-size:30px;font-weight:800;color:#38bdf8}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{border:none;background:#2563eb;color:#fff;padding:10px 16px;border-radius:12px;cursor:pointer;font-weight:700}
.btn.red{background:#ef4444}
.box{background:#111827;border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:22px;box-shadow:0 20px 50px rgba(0,0,0,.25)}
.title{font-size:24px;font-weight:800;margin-bottom:8px}
.sub{color:#94a3b8;margin-bottom:18px;font-size:14px;line-height:1.7}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.full{grid-column:1/-1}
label{font-size:14px;display:block;margin-bottom:6px}
input,select,textarea{width:100%;padding:12px 14px;border:none;outline:none;border-radius:12px;background:#1f2937;color:#fff}
textarea{resize:vertical;min-height:100px}
.result{margin-top:18px;padding:18px;border-radius:16px;background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid rgba(56,189,248,.25);line-height:1.8}
.note{margin-top:14px;color:#38bdf8;font-size:14px;min-height:20px}
.support-fixed{position:fixed;right:14px;bottom:20px;display:flex;flex-direction:column;gap:12px;z-index:50}
.support-wrap{position:relative}
.support-btn{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e3a8a,#2563eb);box-shadow:0 0 18px rgba(37,99,235,.40);border:1px solid rgba(255,255,255,.14)}
.support-btn img{width:24px;height:24px}
.support-tip{position:absolute;right:62px;top:50%;transform:translateY(-50%);background:rgba(15,23,42,.92);color:#fff;border:1px solid rgba(255,255,255,.10);border-radius:10px;padding:7px 10px;font-size:12px;white-space:nowrap;opacity:0;pointer-events:none;transition:.2s}
.support-wrap:hover .support-tip{opacity:1}
@media(max-width:768px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
<div class="topbar">
<div class="logo">TECHMONEY</div>
<div class="actions">
<button class="btn" onclick="location.href='home.html'">Trang chủ</button>
<button class="btn" onclick="location.href='dashboard.html'">Dashboard</button>
<button class="btn red" onclick="logout()">Đăng xuất</button>
</div>
</div>

<div class="box">
<div class="title">Rút ví trả sau</div>
<div class="sub">Tính nhanh số tiền nhận được sau khi trừ phí dịch vụ. Gửi yêu cầu để nhân viên hỗ trợ xử lý.</div>

<div class="grid">
<div>
<label>Số tiền cần rút</label>
<input id="amount" type="number" placeholder="Ví dụ: 1000000">
</div>

<div>
<label>Phí dịch vụ</label>
<select id="fee">
<option value="5">5%</option>
<option value="6">6%</option>
<option value="7">7%</option>
</select>
</div>

<div>
<label>Họ và tên</label>
<input id="fullname" placeholder="Nhập họ tên của bạn">
</div>

<div>
<label>Số điện thoại</label>
<input id="phone" placeholder="Nhập số điện thoại">
</div>

<div class="full">
<label>Ghi chú thêm</label>
<textarea id="note" placeholder="Ví dụ: Cần hỗ trợ trong hôm nay"></textarea>
</div>
</div>

<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:18px">
<button class="btn" onclick="calculateWithdraw()">Tính số tiền nhận</button>
<button class="btn" onclick="sendWithdraw()">Gửi yêu cầu</button>
</div>

<div class="result" id="resultBox">
Nhập số tiền để xem số thực nhận.
</div>

<div class="note" id="msg"></div>
</div>
</div>

<div class="support-fixed">
<div class="support-wrap"><div class="support-tip">Zalo</div><a class="support-btn" href="https://zalo.me/0387676061" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg" alt=""></a></div>
<div class="support-wrap"><div class="support-tip">Messenger</div><a class="support-btn" href="https://www.facebook.com/share/1AsS2Kz2EB/?mibextid=wwXIfr" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/b/be/Facebook_Messenger_logo_2020.svg" alt=""></a></div>
<div class="support-wrap"><div class="support-tip">Telegram</div><a class="support-btn" href="https://t.me/dduwcshuyy" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt=""></a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
function calculateWithdraw(){
const amount = Number(document.getElementById("amount").value || 0);
const fee = Number(document.getElementById("fee").value || 0);
const feeMoney = Math.round(amount * fee / 100);
const receive = amount - feeMoney;

document.getElementById("resultBox").innerHTML = `
<b>Số tiền cần rút:</b> ${amount.toLocaleString("vi-VN")}đ<br>
<b>Phí dịch vụ:</b> ${fee}% (${feeMoney.toLocaleString("vi-VN")}đ)<br>
<b>Số tiền thực nhận:</b> ${receive.toLocaleString("vi-VN")}đ
`;
}

function sendWithdraw(){
const fullname = document.getElementById("fullname").value.trim();
const phone = document.getElementById("phone").value.trim();
if(!fullname || !phone){
document.getElementById("msg").textContent = "Vui lòng nhập họ tên và số điện thoại.";
return;
}
document.getElementById("msg").textContent = "Đã gửi yêu cầu rút ví trả sau. Nhân viên sẽ liên hệ bạn sớm.";
}

async function logout(){
await sb.auth.signOut();
location.href = "login.html";
}

calculateWithdraw();
</script>
</body>
</html>
