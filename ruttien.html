<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TECHMONEY - Rút tiền</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body{background:#0f172a;color:#fff;min-height:100vh;padding:30px;}
    .wrap{max-width:850px;margin:auto;}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
    .logo{font-size:28px;font-weight:800;color:#38bdf8;}
    .actions{display:flex;gap:10px;flex-wrap:wrap;}
    .btn{
      border:none;
      background:#2563eb;
      color:#fff;
      padding:10px 16px;
      border-radius:10px;
      cursor:pointer;
      font-weight:700;
    }
    .btn.red{background:#ef4444;}
    .box{
      background:#111827;
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:24px;
      box-shadow:0 20px 50px rgba(0,0,0,.25);
    }
    .title{font-size:24px;font-weight:800;margin-bottom:8px;}
    .sub{color:#94a3b8;margin-bottom:18px;font-size:14px;}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .full{grid-column:1/-1;}
    label{font-size:14px;display:block;margin-bottom:6px;}
    input,select,textarea{
      width:100%;
      padding:12px 14px;
      border:none;
      outline:none;
      border-radius:12px;
      background:#1f2937;
      color:#fff;
    }
    textarea{resize:vertical;min-height:100px;}
    .balance-box{
      margin-top:18px;
      padding:18px;
      border-radius:14px;
      background:linear-gradient(135deg,#1e293b,#0f172a);
      border:1px solid rgba(56,189,248,.25);
    }
    .balance-box h3{margin-bottom:10px;color:#38bdf8;}
    .note{margin-top:14px;color:#38bdf8;font-size:14px;min-height:20px;}
    @media(max-width:768px){
      .grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="logo">TECHMONEY</div>
      <div class="actions">
        <button class="btn" onclick="location.href='dashboard.html'">Dashboard</button>
        <button class="btn" onclick="location.href='lichsu.html'">Lịch sử</button>
        <button class="btn red" onclick="logout()">Đăng xuất</button>
      </div>
    </div>

    <div class="box">
      <div class="title">Rút tiền</div>
      <div class="sub">Tạo yêu cầu rút tiền qua MoMo hoặc ngân hàng. Admin duyệt xong số dư sẽ tự trừ.</div>

      <div class="balance-box">
        <h3>Số dư hiện tại</h3>
        <div id="balanceText">Đang tải...</div>
      </div>

      <div class="grid" style="margin-top:18px;">
        <div>
          <label>Phương thức</label>
          <select id="method" onchange="changeMethod()">
            <option value="momo">MoMo</option>
            <option value="bank">Ngân hàng</option>
          </select>
        </div>

        <div>
          <label>Số tiền rút</label>
          <input id="amount" type="number" placeholder="Ví dụ: 500000">
        </div>

        <div>
          <label>Tên người nhận</label>
          <input id="accountName" placeholder="Nhập tên người nhận">
        </div>

        <div>
          <label>Số điện thoại MoMo / Số tài khoản</label>
          <input id="accountNumber" placeholder="Nhập số MoMo hoặc STK">
        </div>

        <div id="bankWrap" style="display:none;">
          <label>Tên ngân hàng</label>
          <input id="bankName" placeholder="Ví dụ: MB Bank">
        </div>

        <div class="full">
          <label>Ghi chú</label>
          <textarea id="note" placeholder="Nhập ghi chú thêm nếu có"></textarea>
        </div>
      </div>

      <div style="margin-top:18px;">
        <button class="btn" onclick="createWithdraw()">Gửi yêu cầu rút tiền</button>
      </div>

      <div class="note" id="msg"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    const msg = document.getElementById("msg");
    let currentBalance = 0;

    function setMsg(t){ msg.textContent = t || ""; }

    function changeMethod(){
      const method = document.getElementById("method").value;
      document.getElementById("bankWrap").style.display = method === "bank" ? "block" : "none";
    }

    async function loadBalance(){
      const { data:{ user } } = await sb.auth.getUser();
      if(!user){
        location.href = "login.html";
        return;
      }

      const { data, error } = await sb
        .from("users")
        .select("balance")
        .eq("user_id", user.id)
        .single();

      if(error || !data){
        document.getElementById("balanceText").textContent = "Không tải được số dư";
        return;
      }

      currentBalance = Number(data.balance || 0);
      document.getElementById("balanceText").textContent = currentBalance.toLocaleString() + "đ";
    }

    async function createWithdraw(){
      const { data:{ user } } = await sb.auth.getUser();
      if(!user){
        location.href = "login.html";
        return;
      }

      const method = document.getElementById("method").value;
      const amount = Number(document.getElementById("amount").value || 0);
      const accountName = document.getElementById("accountName").value.trim();
      const accountNumber = document.getElementById("accountNumber").value.trim();
      const bankName = document.getElementById("bankName").value.trim();
      const note = document.getElementById("note").value.trim();

      if(amount <= 0){
        setMsg("Vui lòng nhập số tiền hợp lệ.");
        return;
      }

      if(amount > currentBalance){
        setMsg("Số dư không đủ để rút.");
        return;
      }

      if(!accountName || !accountNumber){
        setMsg("Vui lòng nhập đủ thông tin người nhận.");
        return;
      }

      setMsg("Đang gửi yêu cầu...");

      const { error } = await sb.from("transactions").insert({
        user_id: user.id,
        type: "withdraw",
        method,
        amount,
        account_name: accountName,
        account_number: accountNumber,
        bank_name: bankName,
        note,
        status: "pending"
      });

      if(error){
        setMsg("Lỗi: " + error.message);
        return;
      }

      setMsg("Đã gửi yêu cầu rút tiền. Chờ admin duyệt.");
      document.getElementById("amount").value = "";
      document.getElementById("accountName").value = "";
      document.getElementById("accountNumber").value = "";
      document.getElementById("bankName").value = "";
      document.getElementById("note").value = "";
    }

    async function logout(){
      await sb.auth.signOut();
      location.href = "login.html";
    }

    changeMethod();
    loadBalance();
  </script>
</body>
</html>
