<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECHMONEY - Giới thiệu bạn bè</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0f172a;color:#fff;min-height:100vh;padding:24px}
.wrap{max-width:900px;margin:auto}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.logo{font-size:30px;font-weight:800;color:#38bdf8}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{border:none;background:#2563eb;color:#fff;padding:10px 16px;border-radius:12px;cursor:pointer;font-weight:700}
.btn.red{background:#ef4444}
.box{background:#111827;border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:22px;box-shadow:0 20px 50px rgba(0,0,0,.25)}
.title{font-size:24px;font-weight:800;margin-bottom:8px}
.sub{color:#94a3b8;margin-bottom:18px;font-size:14px;line-height:1.7}
.code-box{padding:18px;border-radius:16px;background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid rgba(56,189,248,.25);margin-bottom:16px}
.code{font-size:24px;font-weight:800;color:#38bdf8;word-break:break-all}
.list{display:flex;flex-direction:column;gap:12px}
.item{display:flex;justify-content:space-between;gap:10px;padding:14px;border-radius:16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.06)}
.support-fixed{position:fixed;right:14px;bottom:20px;display:flex;flex-direction:column;gap:12px;z-index:50}
.support-wrap{position:relative}
.support-btn{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e3a8a,#2563eb);box-shadow:0 0 18px rgba(37,99,235,.40);border:1px solid rgba(255,255,255,.14)}
.support-btn img{width:24px;height:24px}
.support-tip{position:absolute;right:62px;top:50%;transform:translateY(-50%);background:rgba(15,23,42,.92);color:#fff;border:1px solid rgba(255,255,255,.10);border-radius:10px;padding:7px 10px;font-size:12px;white-space:nowrap;opacity:0;pointer-events:none;transition:.2s}
.support-wrap:hover .support-tip{opacity:1}
</style>
</head>
<body>
<div class="wrap">
<div class="topbar">
<div class="logo">TECHMONEY</div>
<div class="actions">
<button class="btn" onclick="location.href='home.html'">Trang chủ</button>
<button class="btn" onclick="location.href='dashboard.html'">Dashboard</button>
<button class="btn red" onclick="logout()">Đăng xuất</button>
</div>
</div>

<div class="box">
<div class="title">Giới thiệu bạn bè</div>
<div class="sub">Chia sẻ mã giới thiệu để nhận ưu đãi từ TECHMONEY khi bạn bè đăng ký và sử dụng dịch vụ.</div>

<div class="code-box">
<div style="margin-bottom:8px">Mã giới thiệu của bạn</div>
<div class="code" id="refCode">TECHMONEY-USER</div>
<div style="margin-top:12px">
<button class="btn" onclick="copyCode()">Sao chép mã</button>
</div>
</div>

<div class="list">
<div class="item">
<div>
<b>Nguyễn Văn A</b><br>
<span style="color:#94a3b8;font-size:13px">Đăng ký thành công</span>
</div>
<b>+1 lượt</b>
</div>
<div class="item">
<div>
<b>Trần Thị B</b><br>
<span style="color:#94a3b8;font-size:13px">Đã sử dụng dịch vụ</span>
</div>
<b>+1 lượt</b>
</div>
</div>

<div id="msg" style="margin-top:14px;color:#38bdf8;font-size:14px"></div>
</div>
</div>

<div class="support-fixed">
<div class="support-wrap"><div class="support-tip">Zalo</div><a class="support-btn" href="https://zalo.me/0387676061" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg" alt=""></a></div>
<div class="support-wrap"><div class="support-tip">Messenger</div><a class="support-btn" href="https://www.facebook.com/share/1AsS2Kz2EB/?mibextid=wwXIfr" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/b/be/Facebook_Messenger_logo_2020.svg" alt=""></a></div>
<div class="support-wrap"><div class="support-tip">Telegram</div><a class="support-btn" href="https://t.me/dduwcshuyy" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt=""></a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
async function buildCode(){
const { data:{ user } } = await sb.auth.getUser();
if(!user){
location.href = "login.html";
return;
}
document.getElementById("refCode").textContent = "TECH-" + user.id.slice(0,8).toUpperCase();
}

function copyCode(){
const code = document.getElementById("refCode").textContent;
navigator.clipboard.writeText(code);
document.getElementById("msg").textContent = "Đã sao chép mã giới thiệu.";
}

async function logout(){
await sb.auth.signOut();
location.href = "login.html";
}

buildCode();
</script>
</body>
</html>
