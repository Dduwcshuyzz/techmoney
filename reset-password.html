<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECHMONEY - Đặt lại mật khẩu</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
min-height:100vh;
background:#0f172a;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}
body.light{
background:#f1f5f9;
color:#0f172a;
}
.reset-box{
width:100%;
max-width:460px;
background:rgba(17,24,39,.94);
border:1px solid rgba(255,255,255,.08);
border-radius:22px;
padding:24px;
box-shadow:0 18px 40px rgba(0,0,0,.18);
}
body.light .reset-box{
background:#fff;
border-color:rgba(15,23,42,.10);
}
.reset-title{
font-size:28px;
font-weight:800;
margin-bottom:8px;
}
.reset-sub{
color:#94a3b8;
line-height:1.7;
font-size:14px;
margin-bottom:18px;
}
body.light .reset-sub{color:#475569;}
.form-group{margin-bottom:14px;}
label{font-size:13px;display:block;margin-bottom:6px;}
.field-input{
width:100%;
padding:12px 14px;
border:none;
outline:none;
border-radius:12px;
background:#111827;
color:#fff;
border:1px solid rgba(255,255,255,.08);
}
body.light .field-input{
background:#fff;
color:#0f172a;
border-color:rgba(15,23,42,.10);
}
.btn{
width:100%;
border:none;
padding:12px 14px;
border-radius:12px;
background:linear-gradient(90deg,#2563eb,#3b82f6);
color:#fff;
font-weight:800;
cursor:pointer;
}
.note{
margin-top:12px;
color:#38bdf8;
font-size:13px;
min-height:18px;
}
.show-pass{
margin-top:8px;
font-size:13px;
color:#94a3b8;
cursor:pointer;
user-select:none;
}
.link-back{
display:inline-block;
margin-top:14px;
color:#38bdf8;
text-decoration:none;
}
</style>
</head>
<body>

<div class="reset-box">
<div class="reset-title">Đặt lại mật khẩu</div>
<div class="reset-sub">
Nhập mật khẩu mới để hoàn tất quá trình đổi mật khẩu tài khoản TECHMONEY.
</div>

<div class="form-group">
<label>Mật khẩu mới</label>
<input id="newPassword" class="field-input" type="password" placeholder="Nhập mật khẩu mới">
</div>

<div class="form-group">
<label>Xác nhận mật khẩu</label>
<input id="confirmPassword" class="field-input" type="password" placeholder="Nhập lại mật khẩu">
<div class="show-pass" onclick="togglePass()">👁 Hiện / Ẩn mật khẩu</div>
</div>

<button class="btn" onclick="saveNewPassword()">Cập nhật mật khẩu</button>

<div class="note" id="msg"></div>

<a href="login.html" class="link-back">← Quay lại đăng nhập</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
const msg = document.getElementById("msg");

function applyTheme(){
const t = localStorage.getItem("theme");
if(t === "light"){
document.body.classList.add("light");
}else{
document.body.classList.remove("light");
}
}
applyTheme();

function setMsg(text){
msg.textContent = text || "";
}

function togglePass(){
const a = document.getElementById("newPassword");
const b = document.getElementById("confirmPassword");
a.type = a.type === "password" ? "text" : "password";
b.type = b.type === "password" ? "text" : "password";
}

async function saveNewPassword(){
const newPassword = document.getElementById("newPassword").value;
const confirmPassword = document.getElementById("confirmPassword").value;

if(!newPassword || !confirmPassword){
setMsg("Vui lòng nhập đầy đủ mật khẩu.");
return;
}

if(newPassword.length < 6){
setMsg("Mật khẩu nên có ít nhất 6 ký tự.");
return;
}

if(newPassword !== confirmPassword){
setMsg("Mật khẩu xác nhận không khớp.");
return;
}

setMsg("Đang cập nhật mật khẩu...");

const { error } = await sb.auth.updateUser({
password: newPassword
});

if(error){
setMsg("Lỗi cập nhật mật khẩu: " + error.message);
return;
}

setMsg("Đổi mật khẩu thành công. Đang chuyển về đăng nhập...");
setTimeout(() => {
location.href = "login.html";
}, 1200);
}
</script>

</body>
</html>
