<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TECHMONEY - Thông tin cá nhân</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f172a;color:#fff;min-height:100vh;padding:24px;}
.wrap{max-width:900px;margin:auto;}
.topbar{
display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px;
}
.logo{font-size:30px;font-weight:800;color:#38bdf8;}
.top-actions{display:flex;gap:10px;flex-wrap:wrap;}
.btn{
border:none;background:#2563eb;color:#fff;padding:10px 16px;border-radius:12px;
cursor:pointer;font-weight:700;transition:.2s;
}
.btn:hover{transform:translateY(-1px);filter:brightness(1.05);}
.btn.red{background:#ef4444;}

.box{
background:#111827;border:1px solid rgba(255,255,255,.08);border-radius:22px;
padding:22px;box-shadow:0 20px 50px rgba(0,0,0,.25);
}
.title{font-size:24px;font-weight:800;margin-bottom:8px;}
.sub{color:#94a3b8;margin-bottom:18px;font-size:14px;line-height:1.7;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.full{grid-column:1/-1;}
label{font-size:14px;display:block;margin-bottom:6px;}
input{
width:100%;padding:12px 14px;border:none;outline:none;border-radius:12px;background:#1f2937;color:#fff;
}
.note{margin-top:14px;color:#38bdf8;font-size:14px;min-height:20px;}

.support-fixed{
position:fixed;right:14px;bottom:20px;display:flex;flex-direction:column;gap:12px;z-index:50;
}
.support-wrap{position:relative;}
.support-btn{
width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;
background:linear-gradient(135deg,#1e3a8a,#2563eb);box-shadow:0 0 18px rgba(37,99,235,0.40);
border:1px solid rgba(255,255,255,0.14);transition:.2s;
}
.support-btn:hover{transform:scale(1.08);}
.support-btn img,.support-btn svg{width:24px;height:24px;}
.support-tip{
position:absolute;right:62px;top:50%;transform:translateY(-50%);
background:rgba(15,23,42,0.92);color:#fff;border:1px solid rgba(255,255,255,0.10);
border-radius:10px;padding:7px 10px;font-size:12px;white-space:nowrap;opacity:0;pointer-events:none;transition:.2s;
}
.support-wrap:hover .support-tip{opacity:1;}

@media(max-width:768px){
.grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="wrap">
<div class="topbar">
<div class="logo">TECHMONEY</div>
<div class="top-actions">
<button class="btn" onclick="location.href='home.html'">Trang chủ</button>
<button class="btn" onclick="location.href='dashboard.html'">Dashboard</button>
<button class="btn" onclick="location.href='lichsu.html'">Lịch sử</button>
<button class="btn red" onclick="logout()">Đăng xuất</button>
</div>
</div>

<div class="box">
<div class="title">Thông tin cá nhân</div>
<div class="sub">Bạn có thể xem và cập nhật một số thông tin cơ bản của tài khoản TECHMONEY tại đây.</div>

<div class="grid">
<div>
<label>Tên hiển thị</label>
<input id="nameInput" placeholder="Tên hiển thị">
</div>

<div>
<label>Email</label>
<input id="emailInput" readonly>
</div>

<div>
<label>Vai trò</label>
<input id="roleInput" readonly>
</div>

<div>
<label>Trạng thái</label>
<input id="statusInput" readonly>
</div>

<div class="full">
<label>Số dư</label>
<input id="balanceInput" readonly>
</div>
</div>

<div style="margin-top:18px;">
<button class="btn" onclick="saveProfile()">Lưu thay đổi</button>
</div>

<div class="note" id="msg"></div>
</div>
</div>

<div class="support-fixed">
<div class="support-wrap">
<div class="support-tip">Zalo</div>
<a class="support-btn" href="https://zalo.me/0387676061" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Icon_of_Zalo.svg" alt="Zalo">
</a>
</div>
<div class="support-wrap">
<div class="support-tip">Messenger</div>
<a class="support-btn" href="https://www.facebook.com/share/1AsS2Kz2EB/?mibextid=wwXIfr" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/b/be/Facebook_Messenger_logo_2020.svg" alt="Messenger">
</a>
</div>
<div class="support-wrap">
<div class="support-tip">Gọi điện</div>
<a class="support-btn" href="tel:0387676061">
<img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" alt="Phone">
</a>
</div>
<div class="support-wrap">
<div class="support-tip">Telegram</div>
<a class="support-btn" href="https://t.me/dduwcshuyy" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Telegram">
</a>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
let currentUserId = null;
const msg = document.getElementById("msg");

function setMsg(t){ msg.textContent = t || ""; }

async function loadProfile(){
const { data:{ user } } = await sb.auth.getUser();
if(!user){
location.href = "login.html";
return;
}

const { data, error } = await sb
.from("users")
.select("*")
.eq("user_id", user.id)
.single();

if(error || !data){
alert("Không tải được hồ sơ.");
location.href = "login.html";
return;
}

currentUserId = data.user_id;
document.getElementById("nameInput").value = data.name || "";
document.getElementById("emailInput").value = data.email || "";
document.getElementById("roleInput").value = data.role || "user";
document.getElementById("statusInput").value = data.status || "active";
document.getElementById("balanceInput").value = Number(data.balance || 0).toLocaleString("vi-VN") + "đ";
}

async function saveProfile(){
const name = document.getElementById("nameInput").value.trim();
if(!name){
setMsg("Vui lòng nhập tên hiển thị.");
return;
}

const { error } = await sb
.from("users")
.update({ name })
.eq("user_id", currentUserId);

if(error){
setMsg("Lỗi cập nhật: " + error.message);
return;
}

localStorage.setItem("currentUser", name);
setMsg("Đã cập nhật thông tin.");
}

async function logout(){
await sb.auth.signOut();
location.href = "login.html";
}

loadProfile();
</script>
</body>
</html>
