<section class="panel">

<div class="form-grid">

<div>

<label>Tên hiển thị</label>

<input id="name" class="field-input">

</div>

<div>

<label>Email</label>

<input id="email" class="field-input" disabled>

</div>

<div>

<label>Vai trò</label>

<input id="role" class="field-input" disabled>

</div>

<div>

<label>Số dư</label>

<input id="balance" class="field-input" disabled>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="app.js"></script>

<script>

const msg=document.getElementById("msg")

let currentUser

async function loadProfile(){

const { data:{ user } }=await sb.auth.getUser()

currentUser=user

const { data } = await sb
.from("users")
.select("*")
.eq("user_id",user.id)
.single()

document.getElementById("name").value=data.name || ""
document.getElementById("email").value=data.email
document.getElementById("role").value=data.role
document.getElementById("balance").value=tmMoney(data.balance)

}

async function saveProfile(){

const name=document.getElementById("name").value

const { error }=await sb
.from("users")
.update({name})
.eq("user_id",currentUser.id)

if(error){

msg.innerText="Lỗi cập nhật"

return

}

msg.innerText="Đã cập nhật thông tin"

}

loadProfile()

</script>
